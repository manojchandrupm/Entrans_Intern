<h1>Blog Posts</h1>
<a href="{% url 'create_post' %}">Add New Post</a>
{% for post in posts %}
    <h2>{{ post.title }}</h2>
    <p>{{ post.content }}</p>
    <small>By {{ post.author }} | {{ post.created_at }}</small><br>
    <a href="{% url 'update_post' post.id %}">Edit</a>
    <a href="{% url 'delete_post' post.id %}">Delete</a>
    <hr>
{% endfor %}
